<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- 
    Pyramid outline: peak at (100,8), base corners at (20,180).
    All edges follow the same diagonal line.
    At y=72: x = 100 ± 80*(72-8)/172 = 100 ± 29.8 → 70, 130
    At y=132: x = 100 ± 80*(132-8)/172 = 100 ± 57.7 → 42, 158
  -->
  
  <!-- Top pyramid peak -->
  <polygon points="100,8 130,72 70,72" fill="#233565"/>
  
  <!-- AH text in the gap -->
  <text x="100" y="114" text-anchor="middle" font-family="'Alegreya Sans', 'Arial', sans-serif" font-weight="600" font-size="44" fill="#233565" letter-spacing="2">AH</text>
  <text x="145" y="95" font-family="'Alegreya Sans', 'Arial', sans-serif" font-weight="500" font-size="14" fill="#233565">™</text>
  
  <!-- Bottom pyramid base - same slope as peak -->
  <polygon points="42,132 158,132 180,180 20,180" fill="#233565"/>
</svg>
